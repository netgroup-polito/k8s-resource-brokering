apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-eco
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-eco
  template:
    metadata:
      labels:
        app: mock-eco
    spec:
      containers:
      - name: mock-eco
        image: mock-eco:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: mock-eco
  namespace: default
spec:
  type: NodePort
  selector:
    app: mock-eco
  ports:
  - port: 8081
    targetPort: 8081
    nodePort: 30081
