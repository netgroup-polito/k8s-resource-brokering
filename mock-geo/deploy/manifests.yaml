apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-geo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-geo
  template:
    metadata:
      labels:
        app: mock-geo
    spec:
      containers:
      - name: mock-geo
        image: mock-geo:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mock-geo
  namespace: default
spec:
  type: NodePort
  selector:
    app: mock-geo
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
