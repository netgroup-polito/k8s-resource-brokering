apiVersion: v1
kind: ServiceAccount
metadata:
  name: resource-broker
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: resource-broker-role
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: resource-broker-binding
subjects:
- kind: ServiceAccount
  name: resource-broker
  namespace: default
roleRef:
  kind: ClusterRole
  name: resource-broker-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: broker-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: resource-broker
  ports:
  - name: https
    protocol: TCP
    port: 8444
    targetPort: 8444
    nodePort: 30444
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-broker
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-broker
  template:
    metadata:
      labels:
        app: resource-broker
    spec:
      serviceAccountName: resource-broker
      containers:
      - name: broker
        image: resource-broker:latest
        imagePullPolicy: IfNotPresent
        args:
        - --metrics-bind-address=0
        - --health-probe-bind-address=:8081
        - --leader-elect=false
        - --broker-interface=http
        - --http-port=8444
        - --http-cert-path=/etc/broker/certs
        ports:
        - containerPort: 8444
        - containerPort: 8081
        volumeMounts:
        - name: certs
          mountPath: /etc/broker/certs
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: broker-server-tls
