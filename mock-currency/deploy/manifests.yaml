apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-currency
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-currency
  template:
    metadata:
      labels:
        app: mock-currency
    spec:
      containers:
      - name: mock-currency
        image: mock-currency:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: mock-currency
  namespace: default
spec:
  type: NodePort
  selector:
    app: mock-currency
  ports:
  - port: 8082
    targetPort: 8082
    nodePort: 30082
